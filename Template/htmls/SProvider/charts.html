{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
    body {
        background-color: #FFFFFF;
    }
    .menu table {
        width: 100%;
        text-align: center;
    }
    .menu table td:hover {
        background: rgb(0, 0, 0);
    }
    .menu table td {
        background: #584b4f;
    }
    .menu table, .menu table th, .menu table td {
        border-collapse: collapse;
    }
    .menu table th, .menu table td {
        padding: 15px;
    }
    .topic h1 {
        color: white;
        padding: 2px;
        text-align: center;
        border-style: none;
        height: 100px;
        width: 100%;
    }
    #chartContainer {
        width: 80%;
        margin: 0 auto;
        margin-top: 50px;
    }
    .sidemenu {
        margin-top: 150px;
        margin-left: 40px;
        
    }
    .sidemenu a {
        display: block;
        color: white;
        font-size: 18px;
        margin: 20px 0;
        text-decoration: none;
        
    }
    .sidemenu a:hover {
        text-decoration: underline;
    }
</style>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
<script>
window.onload = function() {
    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        title: {
            text: ""
        },
        data: [{
            {% if chart_type == "line" %}
                type: "line",
            {% elif chart_type == "pie" %}
                type: "pie",
            {% elif chart_type == "spline" %}
                type: "spline",
            {% endif %}
            {% if chart_type == "pie" %}
                startAngle: 240,
                yValueFormatString: "##0.00\"%\"",
                indexLabel: "{label} {y}",
            {% endif %}
            dataPoints: [
                {% for o in form %}
                    { y: {{ o.dcount }}, label: "{{ o.names }}" }{% if not forloop.last %},{% endif %}
                {% endfor %}
            ]
        }]
    });
    chart.render();
}
</script>

<body>
<div class="topic">
    <h1>Chart View</h1>
</div>

<div class="sidemenu">
    <a href="{% url 'charts' 'pie' %}">PIE CHART</a>
    <a href="{% url 'charts' 'line' %}">LINE CHART</a>
    <a href="{% url 'charts' 'spline' %}">SPLINE CHART</a>
</div>

<div id="chartContainer" class="graph"></div>
</body>

{% endblock %}
